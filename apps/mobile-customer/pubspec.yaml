name: doer
description: "Doer - Home Services Marketplace for Customers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP Client
  dio: ^5.8.0+1

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  # HTTP
  http: ^1.3.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_messaging: ^15.2.5

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Real-time
  socket_io_client: ^3.0.2
  agora_rtc_engine: ^6.5.0
  permission_handler: ^11.3.1

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # Utils
  intl: ^0.20.2
  timeago: ^3.7.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/doer_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/doer_logo.png"
  adaptive_icon_padding: 0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
